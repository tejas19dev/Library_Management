<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account | The Archive</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "on-tertiary-container": "#54436b",
          "on-surface": "#2d3335",
          "surface-dim": "#d5dbdd",
          "primary-fixed": "#3d89ff",
          "on-tertiary": "#fef6ff",
          "on-surface-variant": "#5a6062",
          "on-error-container": "#6e0a12",
          "surface-container-lowest": "#ffffff",
          "on-tertiary-fixed": "#403057",
          "outline-variant": "#adb3b5",
          "surface-bright": "#f8f9fa",
          "on-primary-fixed-variant": "#001434",
          "surface-container": "#ebeef0",
          "on-primary-fixed": "#000000",
          "tertiary-container": "#e4ceff",
          "on-secondary": "#f6f9ff",
          "secondary-container": "#dfe3e8",
          "error-dim": "#67040d",
          "background": "#f8f9fa",
          "surface": "#f8f9fa",
          "secondary-fixed": "#dfe3e8",
          "surface-container-highest": "#dee3e6",
          "on-primary-container": "#000410",
          "primary": "#005bc1",
          "tertiary": "#695781",
          "primary-fixed-dim": "#2a7bf1",
          "surface-tint": "#005bc1",
          "on-background": "#2d3335",
          "primary-container": "#3d89ff",
          "outline": "#767c7e",
          "on-error": "#fff7f6",
          "error-container": "#fa746f",
          "on-secondary-fixed": "#3c4044",
          "tertiary-fixed-dim": "#d6c0f0",
          "secondary": "#5b5f64",
          "error": "#a83836",
          "secondary-fixed-dim": "#d1d5da",
          "primary-dim": "#0050aa",
          "tertiary-dim": "#5c4b74",
          "inverse-on-surface": "#9b9d9e",
          "on-secondary-fixed-variant": "#585c61",
          "inverse-surface": "#0c0f10",
          "inverse-primary": "#4a8eff",
          "surface-container-low": "#f1f4f5",
          "surface-variant": "#dee3e6",
          "tertiary-fixed": "#e4ceff",
          "on-tertiary-fixed-variant": "#5e4d75",
          "secondary-dim": "#4f5358",
          "on-secondary-container": "#4e5257",
          "on-primary": "#f9f8ff",
          "surface-container-high": "#e5e9eb"
        },
        "borderRadius": {
          "DEFAULT": "0.25rem",
          "lg": "0.5rem",
          "xl": "1.5rem",
          "full": "9999px"
        },
        "fontFamily": {
          "headline": ["Manrope"],
          "body": ["Inter"],
          "label": ["Inter"]
        }
      },
    },
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .brand-gradient {
    background: linear-gradient(135deg, #005bc1 0%, #3d89ff 100%);
  }
  .input-field {
    width: 100%;
    background: #e5e9eb;
    border: none;
    border-radius: 0.75rem;
    padding: 0.875rem 1rem 0.875rem 3rem;
    transition: all 0.2s;
    color: #2d3335;
    font-family: Inter, sans-serif;
  }
  .input-field:focus {
    outline: none;
    box-shadow: 0 0 0 2px rgba(0,91,193,0.2);
    background: #ffffff;
  }
  .strength-bar { height: 4px; border-radius: 2px; transition: all 0.3s; }
</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6">

<!-- Signup Container -->
<div class="w-full max-w-md">

  <!-- Brand Identity -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl brand-gradient mb-4">
      <span class="material-symbols-outlined text-on-primary text-3xl" data-icon="auto_stories">auto_stories</span>
    </div>
    <h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">Join The Archive</h1>
    <p class="font-label text-sm uppercase tracking-[0.1em] text-on-surface-variant mt-2">Create your curator account</p>
  </div>

  <!-- Main Card -->
  <div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_12px_32px_rgba(45,51,53,0.06)] border border-outline-variant/15">

    <!-- Role Toggle -->
    <div class="flex items-center gap-2 bg-surface-container-high rounded-xl p-1 mb-6">
      <button id="role-user" onclick="setRole('user')"
        class="flex-1 py-2.5 rounded-lg font-headline font-bold text-sm transition-all duration-200 brand-gradient text-on-primary shadow-sm">
        Member
      </button>
      <button id="role-admin" onclick="setRole('admin')"
        class="flex-1 py-2.5 rounded-lg font-headline font-bold text-sm transition-all duration-200 text-on-surface-variant">
        Admin
      </button>
    </div>
    <input type="hidden" id="selected-role" value="user"/>

    <!-- Signup Form -->
    <form id="signup-form" class="space-y-5" novalidate>

      <!-- Full Name -->
      <div>
        <label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2 ml-1" for="full-name">
          Full Name
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="person">person</span>
          <input class="input-field" id="full-name" name="full_name" placeholder="Your full name" type="text" autocomplete="name"/>
        </div>
        <p id="name-error" class="text-error text-xs mt-1 ml-1 hidden"></p>
      </div>

      <!-- Email -->
      <div>
        <label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2 ml-1" for="signup-email">
          Email Address
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
          <input class="input-field" id="signup-email" name="email" placeholder="curator@archive.org" type="email" autocomplete="email"/>
        </div>
        <p id="email-error" class="text-error text-xs mt-1 ml-1 hidden"></p>
      </div>

      <!-- Password -->
      <div>
        <label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2 ml-1" for="signup-password">
          Password
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
          <input class="input-field pr-12" id="signup-password" name="password" placeholder="Min. 8 characters" type="password" autocomplete="new-password" oninput="checkStrength(this.value)"/>
          <button type="button" onclick="togglePassword('signup-password', this)"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors">
            <span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
          </button>
        </div>
        <!-- Strength Bars -->
        <div class="flex gap-1 mt-2">
          <div class="strength-bar flex-1 bg-outline-variant/30" id="s1"></div>
          <div class="strength-bar flex-1 bg-outline-variant/30" id="s2"></div>
          <div class="strength-bar flex-1 bg-outline-variant/30" id="s3"></div>
          <div class="strength-bar flex-1 bg-outline-variant/30" id="s4"></div>
        </div>
        <p id="strength-label" class="text-xs text-on-surface-variant mt-1 ml-1"></p>
        <p id="pw-error" class="text-error text-xs mt-1 ml-1 hidden"></p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2 ml-1" for="confirm-password">
          Confirm Password
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock_reset">lock_reset</span>
          <input class="input-field" id="confirm-password" name="confirm_password" placeholder="Repeat your password" type="password" autocomplete="new-password"/>
        </div>
        <p id="confirm-error" class="text-error text-xs mt-1 ml-1 hidden"></p>
      </div>

      <!-- Terms -->
      <div class="flex items-start gap-2 ml-1">
        <input class="rounded-sm border-outline-variant text-primary focus:ring-primary w-4 h-4 mt-0.5 flex-shrink-0" id="terms" type="checkbox" required/>
        <label class="font-body text-xs text-on-surface-variant" for="terms">
          I agree to the <a href="#" class="text-primary font-bold hover:underline">Terms of Service</a> and <a href="#" class="text-primary font-bold hover:underline">Privacy Policy</a>
        </label>
      </div>

      <!-- Submit -->
      <button id="signup-btn" class="w-full brand-gradient text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:-translate-y-1 hover:shadow-xl transition-all duration-300 mt-2" type="submit">
        Create Account
      </button>

      <!-- Error / Success message -->
      <div id="form-message" class="hidden text-center text-sm font-medium py-3 px-4 rounded-xl"></div>
    </form>
  </div>

  <!-- Redirect to Login -->
  <p class="text-center mt-8 font-body text-sm text-on-surface-variant">
    Already have an account?
    <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2" href="login_page.html">Sign in</a>
  </p>

  <!-- Aesthetic Detail -->
  <div class="mt-10 flex justify-center items-center gap-6 opacity-30">
    <span class="material-symbols-outlined text-outline text-lg" data-icon="bookmark">bookmark</span>
    <span class="material-symbols-outlined text-outline text-lg" data-icon="history_edu">history_edu</span>
    <span class="material-symbols-outlined text-outline text-lg" data-icon="ink_pen">ink_pen</span>
  </div>
</div>

<!-- Background Decorations -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[35%] h-[35%] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none"></div>

<script type="module" src="../js/main.js"></script>
<script>
// ── Role Toggle ──────────────────────────────────────────────
function setRole(role) {
  document.getElementById('selected-role').value = role;
  const userBtn  = document.getElementById('role-user');
  const adminBtn = document.getElementById('role-admin');
  if (role === 'user') {
    userBtn.className  = 'flex-1 py-2.5 rounded-lg font-headline font-bold text-sm transition-all duration-200 brand-gradient text-on-primary shadow-sm';
    adminBtn.className = 'flex-1 py-2.5 rounded-lg font-headline font-bold text-sm transition-all duration-200 text-on-surface-variant';
  } else {
    adminBtn.className = 'flex-1 py-2.5 rounded-lg font-headline font-bold text-sm transition-all duration-200 brand-gradient text-on-primary shadow-sm';
    userBtn.className  = 'flex-1 py-2.5 rounded-lg font-headline font-bold text-sm transition-all duration-200 text-on-surface-variant';
  }
}

// ── Password Toggle ──────────────────────────────────────────
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const icon  = btn.querySelector('.material-symbols-outlined');
  if (input.type === 'password') {
    input.type = 'text';
    icon.textContent = 'visibility_off';
  } else {
    input.type = 'password';
    icon.textContent = 'visibility';
  }
}

// ── Password Strength ────────────────────────────────────────
function checkStrength(val) {
  let score = 0;
  if (val.length >= 8)          score++;
  if (/[A-Z]/.test(val))        score++;
  if (/[0-9]/.test(val))        score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e'];
  const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
  for (let i = 1; i <= 4; i++) {
    const bar = document.getElementById('s' + i);
    bar.style.background = i <= score ? colors[score] : '#d1d5da';
  }
  document.getElementById('strength-label').textContent = val.length ? labels[score] : '';
}

// ── Field Error Helpers ──────────────────────────────────────
function showError(id, msg)  { const el = document.getElementById(id); el.textContent = msg; el.classList.remove('hidden'); }
function clearError(id)      { document.getElementById(id).classList.add('hidden'); }
function clearAllErrors()    { ['name-error','email-error','pw-error','confirm-error'].forEach(clearError); }
</script>
</body></html>
