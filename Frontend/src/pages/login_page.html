<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | The Archive</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#54436b",
                    "on-surface": "#2d3335",
                    "surface-dim": "#d5dbdd",
                    "primary-fixed": "#3d89ff",
                    "on-tertiary": "#fef6ff",
                    "on-surface-variant": "#5a6062",
                    "on-error-container": "#6e0a12",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#403057",
                    "outline-variant": "#adb3b5",
                    "surface-bright": "#f8f9fa",
                    "on-primary-fixed-variant": "#001434",
                    "surface-container": "#ebeef0",
                    "on-primary-fixed": "#000000",
                    "tertiary-container": "#e4ceff",
                    "on-secondary": "#f6f9ff",
                    "secondary-container": "#dfe3e8",
                    "error-dim": "#67040d",
                    "background": "#f8f9fa",
                    "surface": "#f8f9fa",
                    "secondary-fixed": "#dfe3e8",
                    "surface-container-highest": "#dee3e6",
                    "on-primary-container": "#000410",
                    "primary": "#005bc1",
                    "tertiary": "#695781",
                    "primary-fixed-dim": "#2a7bf1",
                    "surface-tint": "#005bc1",
                    "on-background": "#2d3335",
                    "primary-container": "#3d89ff",
                    "outline": "#767c7e",
                    "on-error": "#fff7f6",
                    "error-container": "#fa746f",
                    "on-secondary-fixed": "#3c4044",
                    "tertiary-fixed-dim": "#d6c0f0",
                    "secondary": "#5b5f64",
                    "error": "#a83836",
                    "secondary-fixed-dim": "#d1d5da",
                    "primary-dim": "#0050aa",
                    "tertiary-dim": "#5c4b74",
                    "inverse-on-surface": "#9b9d9e",
                    "on-secondary-fixed-variant": "#585c61",
                    "inverse-surface": "#0c0f10",
                    "inverse-primary": "#4a8eff",
                    "surface-container-low": "#f1f4f5",
                    "surface-variant": "#dee3e6",
                    "tertiary-fixed": "#e4ceff",
                    "on-tertiary-fixed-variant": "#5e4d75",
                    "secondary-dim": "#4f5358",
                    "on-secondary-container": "#4e5257",
                    "on-primary": "#f9f8ff",
                    "surface-container-high": "#e5e9eb"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .brand-gradient {
        background: linear-gradient(135deg, #005bc1 0%, #3d89ff 100%);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6">
<!-- Login Container -->
<div class="w-full max-w-md">
<!-- Brand Identity Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl brand-gradient mb-4">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="auto_stories">auto_stories</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">The Archive</h1>
<p class="font-label text-sm uppercase tracking-[0.1em] text-on-surface-variant mt-2">Library Management System</p>
</div>
<!-- Main Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_12px_32px_rgba(45,51,53,0.06)] border border-outline-variant/15">
<!-- Google Login Button -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-high hover:bg-surface-container-highest transition-colors duration-200 py-3.5 px-4 rounded-xl font-body font-medium text-on-surface group">
<svg class="group-hover:scale-105 transition-transform" height="20" viewbox="0 0 24 24" width="20">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<div class="flex items-center my-8">
<div class="flex-grow h-px bg-outline-variant/20"></div>
<span class="px-4 font-label text-[10px] uppercase tracking-widest text-outline">or sign in with email</span>
<div class="flex-grow h-px bg-outline-variant/20"></div>
</div>
<!-- Traditional Login Form -->
<form action="#" class="space-y-6">
<div>
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2 ml-1" for="email">
                        Email Address
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest rounded-xl py-3.5 pl-12 pr-4 transition-all duration-200 placeholder:text-outline/60 text-on-surface font-body" id="email" name="email" placeholder="curator@archive.org" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="password">
                            Password
                        </label>
<a class="font-label text-[10px] uppercase tracking-wider text-primary hover:text-primary-dim font-bold" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest rounded-xl py-3.5 pl-12 pr-4 transition-all duration-200 placeholder:text-outline/60 text-on-surface font-body" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center gap-2 ml-1">
<input class="rounded-sm border-outline-variant text-primary focus:ring-primary w-4 h-4" id="remember" type="checkbox"/>
<label class="font-body text-xs text-on-surface-variant" for="remember">Keep me signed in for 30 days</label>
</div>
<button class="w-full brand-gradient text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:-translate-y-1 hover:shadow-xl transition-all duration-300" type="submit">
                    Sign in to Archive
                </button>
</form>
</div>
<!-- Footer / Redirect -->
<p class="text-center mt-8 font-body text-sm text-on-surface-variant">
            Not part of the curatorial team? 
            <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2" href="#">Request Access</a>
</p>
<!-- Aesthetic Detail -->
<div class="mt-12 flex justify-center items-center gap-6 opacity-30">
<span class="material-symbols-outlined text-outline text-lg" data-icon="bookmark">bookmark</span>
<span class="material-symbols-outlined text-outline text-lg" data-icon="history_edu">history_edu</span>
<span class="material-symbols-outlined text-outline text-lg" data-icon="ink_pen">ink_pen</span>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[35%] h-[35%] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none"></div>

<script type="module" src="../js/main.js"></script>
</body></html>
