<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
    <link rel="stylesheet" href="../styles/books.css">
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-book"></i>📚 DevLibrary</h1>

        <div class="nav-bar">
            <input type="text" placeholder="Search for books" class="input" id="searchInput">
            <button onclick="searchBooks()" class="search-btn">Search</button>
        </div>

        <nav>
            <a href="index1.html">Home</a>
            <a href="books.html"class="active">Books</a>
            <a href="members.html">Members</a>
            <a href="issue.html">Issue Books</a>
            <a href="contact.html">Contact Us</a>
        </nav>    
    </header>

    <section class="book-ad">
        <div class="ad-img">
            
        </div>
        <div class="offer-text">
            <h1>🔥Special Library Offer</h1>
            <p>Get 20% Discount on Technical Books</p>
            <a href="#explore"><button>Explore Now</button></a>
        </div>
    </section>


    <section class="shop-section" id="explore">
        <h2 class="section-title">🔥Trending Books</h2>
        <div class="containers" id="bookGrid">
            <!-- Books will be loaded here dynamically from backend -->
            <p style="text-align:center;width:100%;">Loading books...</p>
        </div>
        
        <div style="text-align:center;margin-top:40px;margin-bottom:40px;">
            <button id="loadMoreBtn" class="load-more-btn" onclick="loadMoreBooks()">Learn More</button>
            <p id="noMoreMsg" style="display:none;color:#666;margin-top:15px;">No more books to load</p>
        </div>
    </section>

<div class="footer">
    © 2026 DevLibrary |  Developed by DevTeam
</div>

    <script>
    let currentPage = 1;
    let isLoading = false;
    const limit = 16;

    // Fetch books from backend API
    async function loadBooks(reset = false) {
        if (isLoading) return;
        isLoading = true;
        
        try {
            if (reset) {
                currentPage = 1;
                document.getElementById('bookGrid').innerHTML = '<p style="text-align:center;width:100%;padding:30px;">Loading books...</p>';
                document.getElementById('loadMoreBtn').style.display = 'inline-block';
                document.getElementById('noMoreMsg').style.display = 'none';
            }
            
            const response = await fetch(`http://localhost:4000/api/books?page=${currentPage}&limit=${limit}`);
            const result = await response.json();
            const books = result.data || result;
            const meta = result.meta;
            
            // Clear on first load
            if (currentPage === 1) {
                document.getElementById('bookGrid').innerHTML = '';
            }
            
            // Display books
            books.forEach((book, index) => {
                const card = createBookCard(book, (currentPage - 1) * limit + index + 1);
                document.getElementById('bookGrid').innerHTML += card;
            });
            
            // Check if more books available
            if (!meta || currentPage >= meta.totalPages) {
                document.getElementById('loadMoreBtn').style.display = 'none';
                document.getElementById('noMoreMsg').style.display = 'block';
            }
        } catch (error) {
            console.error('Error loading books:', error);
            document.getElementById('bookGrid').innerHTML = '<p style="text-align:center;width:100%;color:red;">Error loading books</p>';
        } finally {
            isLoading = false;
        }
    }

    // Load more books
    function loadMoreBooks() {
        currentPage++;
        loadBooks(false);
    }

    function createBookCard(book, num) {
        const price = book.price_inr || 499;
        const title = book.title || 'Unknown Title';
        const author = book.author || 'Unknown Author';
        const coverUrl = book.cover_image_url || '';
        
        const coverImg = coverUrl 
            ? `<img src="${coverUrl}" alt="${title}" style="width:100%;height:100%;object-fit:cover;">` 
            : `<span style="font-size:40px;">📚</span>`;
            
        return `
            <div class="card">
                <div id="book${num}">${coverImg}</div>
                <h4 class="book-title">${title.substring(0, 40)}${title.length > 40 ? '...' : ''}</h4>
                <p>Author: ${author.substring(0, 30)}${author.length > 30 ? '...' : ''}</p>
                <p id="price">₹${price}</p>
                <div class="book-buttons">
                    <a class="cart-btn" onclick="addToCart('${title.replace(/'/g, "\\'")}', ${price}, '${coverUrl.replace(/'/g, "\\'")}')" href="cart.html">
                        Add to Cart
                    </a>
                    <a class="buy-btn" onclick="buyNow('${title.replace(/'/g, "\\'")}', ${price}, '${coverUrl.replace(/'/g, "\\'")}')" href="cart.html?buyNow=true">
                        Buy Now
                    </a>
                </div>
            </div>
        `;
    }

    // Search books from backend
    async function searchBooks() {
        const input = document.getElementById('searchInput').value.trim();
        const grid = document.getElementById('bookGrid');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const noMoreMsg = document.getElementById('noMoreMsg');
        
        if (!input) {
            loadBooks(true);
            return;
        }

        try {
            grid.innerHTML = '<p style="text-align:center;width:100%;">Searching...</p>';
            loadMoreBtn.style.display = 'none';
            noMoreMsg.style.display = 'none';
            
            const response = await fetch(`http://localhost:4000/api/books/search?q=${encodeURIComponent(input)}`);
            const result = await response.json();
            const books = result.data || result;
            
            grid.innerHTML = '';
            
            if (books.length === 0) {
                grid.innerHTML = '<p style="text-align:center;width:100%;">No books found</p>';
                return;
            }
            
            books.forEach((book, index) => {
                grid.innerHTML += createBookCard(book, index + 1);
            });
        } catch (error) {
            console.error('Search error:', error);
            grid.innerHTML = '<p style="text-align:center;width:100%;color:red;">Search failed</p>';
        }
    }

    // Load books on page load
    document.addEventListener('DOMContentLoaded', loadBooks);
    </script>

    <script>
    function addToCart(name, price, image) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push({ name: name, price: price, image: image });
        localStorage.setItem("cart", JSON.stringify(cart));
    }

    function buyNow(book, price, image) {
        let item = { name: book, price: price, image: image };
        localStorage.setItem("buyNow", JSON.stringify(item));
    }
    </script>
