<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | The Archive</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#54436b",
                    "on-surface": "#2d3335",
                    "surface-dim": "#d5dbdd",
                    "primary-fixed": "#3d89ff",
                    "on-tertiary": "#fef6ff",
                    "on-surface-variant": "#5a6062",
                    "on-error-container": "#6e0a12",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#403057",
                    "outline-variant": "#adb3b5",
                    "surface-bright": "#f8f9fa",
                    "on-primary-fixed-variant": "#001434",
                    "surface-container": "#ebeef0",
                    "on-primary-fixed": "#000000",
                    "tertiary-container": "#e4ceff",
                    "on-secondary": "#f6f9ff",
                    "secondary-container": "#dfe3e8",
                    "error-dim": "#67040d",
                    "background": "#f8f9fa",
                    "surface": "#f8f9fa",
                    "secondary-fixed": "#dfe3e8",
                    "surface-container-highest": "#dee3e6",
                    "on-primary-container": "#000410",
                    "primary": "#005bc1",
                    "tertiary": "#695781",
                    "primary-fixed-dim": "#2a7bf1",
                    "surface-tint": "#005bc1",
                    "on-background": "#2d3335",
                    "primary-container": "#3d89ff",
                    "outline": "#767c7e",
                    "on-error": "#fff7f6",
                    "error-container": "#fa746f",
                    "on-secondary-fixed": "#3c4044",
                    "tertiary-fixed-dim": "#d6c0f0",
                    "secondary": "#5b5f64",
                    "error": "#a83836",
                    "secondary-fixed-dim": "#d1d5da",
                    "primary-dim": "#0050aa",
                    "tertiary-dim": "#5c4b74",
                    "inverse-on-surface": "#9b9d9e",
                    "on-secondary-fixed-variant": "#585c61",
                    "inverse-surface": "#0c0f10",
                    "inverse-primary": "#4a8eff",
                    "surface-container-low": "#f1f4f5",
                    "surface-variant": "#dee3e6",
                    "tertiary-fixed": "#e4ceff",
                    "on-tertiary-fixed-variant": "#5e4d75",
                    "secondary-dim": "#4f5358",
                    "on-secondary-container": "#4e5257",
                    "on-primary": "#f9f8ff",
                    "surface-container-high": "#e5e9eb"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .brand-gradient {
        background: linear-gradient(135deg, #005bc1 0%, #3d89ff 100%);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6">
<div class="w-full max-w-md">
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl brand-gradient mb-4">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="auto_stories">auto_stories</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">Join The Archive</h1>
<p class="font-label text-sm uppercase tracking-[0.1em] text-on-surface-variant mt-2">Create your account</p>
</div>
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_12px_32px_rgba(45,51,53,0.06)] border border-outline-variant/15">
<form id="signup-form" class="space-y-5">
<div>
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2 ml-1" for="full_name">
                        Full Name
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="person">person</span>
<input class="w-full bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest rounded-xl py-3.5 pl-12 pr-4 transition-all duration-200 placeholder:text-outline/60 text-on-surface font-body" id="full_name" name="full_name" placeholder="John Doe" type="text" required/>
</div>
</div>
<div>
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2 ml-1" for="email">
                        Email Address
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest rounded-xl py-3.5 pl-12 pr-4 transition-all duration-200 placeholder:text-outline/60 text-on-surface font-body" id="email" name="email" placeholder="curator@archive.org" type="email" required/>
</div>
</div>
<div>
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2 ml-1" for="password">
                        Password
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest rounded-xl py-3.5 pl-12 pr-4 transition-all duration-200 placeholder:text-outline/60 text-on-surface font-body" id="password" name="password" placeholder="Min 6 characters" type="password" minlength="6" required/>
</div>
</div>
<div>
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2 ml-1" for="confirm_password">
                        Confirm Password
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest rounded-xl py-3.5 pl-12 pr-4 transition-all duration-200 placeholder:text-outline/60 text-on-surface font-body" id="confirm_password" name="confirm_password" placeholder="Confirm password" type="password" required/>
</div>
</div>
<button class="w-full brand-gradient text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:-translate-y-1 hover:shadow-xl transition-all duration-300" type="submit">
                    Create Account
                </button>
</form>
</div>
<p class="text-center mt-8 font-body text-sm text-on-surface-variant">
            Already have an account? 
            <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2" href="login_page.html">Sign in</a>
</p>
</div>
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[35%] h-[35%] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none"></div>

<script type="module">
const API_BASE_URL = 'http://localhost:4000/api';

function showToast(type, message) {
    const container = document.getElementById('toast-container') || (() => {
        const c = document.createElement('div');
        c.id = 'toast-container';
        c.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:8px;';
        document.body.appendChild(c);
        return c;
    })();
    const toast = document.createElement('div');
    const bg = type === 'success' ? '#16a34a' : '#dc2626';
    toast.style.cssText = `background:${bg};color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;font-family:Inter,sans-serif;box-shadow:0 4px 12px rgba(0,0,0,.15);`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
}

document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const full_name = document.getElementById('full_name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm_password = document.getElementById('confirm_password').value;
    
    if (!full_name || !email || !password) {
        showToast('error', 'Please fill in all fields');
        return;
    }
    if (password !== confirm_password) {
        showToast('error', 'Passwords do not match');
        return;
    }
    if (password.length < 6) {
        showToast('error', 'Password must be at least 6 characters');
        return;
    }
    
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Creating account...';
    
    try {
        const res = await fetch(`${API_BASE_URL}/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, full_name, role: 'user' })
        });
        const data = await res.json();
        
        if (!res.ok) {
            showToast('error', data.error || 'Signup failed');
            btn.disabled = false;
            btn.textContent = 'Create Account';
            return;
        }
        
        showToast('success', 'Account created! Redirecting to login...');
        setTimeout(() => window.location.href = 'login_page.html', 1500);
    } catch (err) {
        showToast('error', 'Network error. Is the server running?');
        btn.disabled = false;
        btn.textContent = 'Create Account';
    }
});
</script>
</body></html>
